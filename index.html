<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>FlickFacts Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080a0f;
  --surface: #0f1218;
  --surface2: #161b24;
  --border: #1e2530;
  --accent: #e8b84b;
  --text: #e8eaf0;
  --muted: #6b7280;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; overflow-x:hidden; }

/* HEADER */
header {
  display:flex; align-items:center; gap:16px;
  padding:14px 24px;
  border-bottom:1px solid var(--border);
  background:rgba(8,10,15,0.97);
  backdrop-filter:blur(12px);
  position:sticky; top:0; z-index:200;
}
.logo {
  font-family:'Bebas Neue',sans-serif; font-size:26px;
  letter-spacing:2px; color:var(--accent);
  cursor:pointer; flex-shrink:0;
}
.logo span { color:var(--text); }

/* SEARCH */
.search-wrap { flex:1; max-width:500px; position:relative; }
.search-input {
  width:100%;
  background:var(--surface2); border:1px solid var(--border);
  color:var(--text); padding:10px 44px 10px 16px;
  border-radius:10px; font-family:'DM Sans',sans-serif;
  font-size:14px; outline:none; transition:border-color .2s;
}
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--muted); }
.search-btn {
  position:absolute; right:10px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; color:var(--muted);
  display:flex; align-items:center; transition:color .2s;
}
.search-btn:hover { color:var(--accent); }
.search-btn svg { width:18px; height:18px; }
.search-dropdown {
  position:absolute; top:calc(100% + 6px); left:0; right:0;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; z-index:300; display:none;
  box-shadow:0 20px 60px rgba(0,0,0,0.8); max-height:420px; overflow-y:auto;
}
.search-dropdown.open { display:block; }
.sri {
  display:flex; align-items:center; gap:12px;
  padding:10px 14px; cursor:pointer;
  border-bottom:1px solid var(--border); transition:background .15s;
}
.sri:last-child { border-bottom:none; }
.sri:hover { background:var(--surface2); }
.sri img { width:36px; height:52px; object-fit:cover; border-radius:4px; background:var(--surface2); flex-shrink:0; }
.sri-info { flex:1; min-width:0; }
.sri-title { font-size:14px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sri-meta { font-size:12px; color:var(--muted); margin-top:2px; }
.sri-type {
  font-size:11px; padding:2px 8px; border-radius:20px;
  background:var(--surface2); color:var(--muted);
  border:1px solid var(--border); flex-shrink:0;
}
.sri-type.tv { color:var(--accent); border-color:rgba(232,184,75,0.3); background:rgba(232,184,75,0.08); }
.s-msg { padding:18px; text-align:center; color:var(--muted); font-size:14px; }

/* BACKDROP */
.backdrop-wrap { position:fixed; inset:0; z-index:-1; overflow:hidden; pointer-events:none; }
#backdrop-img { width:100%; height:100%; object-fit:cover; opacity:0; transition:opacity 1.2s; filter:blur(3px) brightness(0.12); }

/* PAGES */
.page { display:none; }
.page.active { display:block; }

/* HOME */
.container { max-width:1100px; margin:0 auto; padding:28px 16px 80px; }
.tabs { display:flex; gap:4px; margin-bottom:24px; border-bottom:1px solid var(--border); flex-wrap:wrap; }
.tab-btn {
  padding:10px 16px; font-family:'DM Sans',sans-serif; font-size:13px;
  font-weight:500; background:none; border:none; color:var(--muted);
  cursor:pointer; border-bottom:2px solid transparent;
  transition:all .2s; margin-bottom:-1px; white-space:nowrap;
}
.tab-btn.active { color:var(--accent); border-bottom-color:var(--accent); }
.tab-btn:hover:not(.active) { color:var(--text); }
.sec-hdr { display:flex; align-items:baseline; gap:10px; margin-bottom:18px; }
.sec-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:2px; }
.sec-badge {
  font-size:11px; padding:2px 10px;
  background:rgba(232,184,75,0.15); color:var(--accent);
  border-radius:20px; border:1px solid rgba(232,184,75,0.3); font-weight:500;
}

/* GRID */
.movie-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:14px; }
@media(min-width:640px) { .movie-grid { grid-template-columns:repeat(auto-fill,minmax(165px,1fr)); } }
.mc {
  cursor:pointer; border-radius:10px; overflow:hidden;
  background:var(--surface); border:1px solid var(--border);
  transition:transform .2s, border-color .2s, box-shadow .2s; position:relative;
}
.mc:hover { transform:translateY(-4px); border-color:var(--accent); box-shadow:0 12px 40px rgba(0,0,0,0.6); }
.mc-pw { position:relative; aspect-ratio:2/3; overflow:hidden; }
.mc-pw img { width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s; }
.mc:hover .mc-pw img { transform:scale(1.04); }
.mc-ov {
  position:absolute; inset:0;
  background:linear-gradient(to top,rgba(8,10,15,0.95) 0%,transparent 50%);
  opacity:0; transition:opacity .2s;
  display:flex; align-items:center; justify-content:center;
}
.mc:hover .mc-ov { opacity:1; }
.pico {
  width:44px; height:44px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 0 30px rgba(232,184,75,0.5);
  transform:scale(0.8); transition:transform .2s;
}
.mc:hover .pico { transform:scale(1); }
.pico svg { width:18px; height:18px; fill:#000; margin-left:3px; }
.mc-rate {
  position:absolute; top:8px; right:8px;
  background:rgba(8,10,15,0.85); color:var(--accent);
  font-size:11px; font-weight:700; padding:3px 7px;
  border-radius:6px; border:1px solid rgba(232,184,75,0.3);
}
.mc-info { padding:10px; }
.mc-title {
  font-size:13px; font-weight:500; line-height:1.4;
  display:-webkit-box; -webkit-line-clamp:2;
  -webkit-box-orient:vertical; overflow:hidden;
}
.mc-year { font-size:11px; color:var(--muted); margin-top:3px; }
.skeleton {
  background:linear-gradient(90deg,var(--surface) 25%,var(--surface2) 50%,var(--surface) 75%);
  background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:6px;
}
@keyframes shimmer { to { background-position:-200% 0; } }
.load-more-wrap { text-align:center; margin-top:28px; }
.load-more-btn {
  padding:11px 32px; background:var(--surface); border:1px solid var(--border);
  color:var(--text); border-radius:10px; font-family:'DM Sans',sans-serif;
  font-size:14px; font-weight:500; cursor:pointer; transition:all .2s;
}
.load-more-btn:hover { border-color:var(--accent); color:var(--accent); }

/* PLAYER PAGE */
.player-container { max-width:1100px; margin:0 auto; padding:20px 16px 80px; }
.movie-strip {
  display:flex; align-items:center; gap:14px; margin-bottom:18px;
  padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:12px;
}
#strip-poster { width:50px; height:74px; object-fit:cover; border-radius:6px; flex-shrink:0; background:var(--surface2); }
.strip-info { flex:1; min-width:0; }
#strip-title { font-family:'Bebas Neue',sans-serif; font-size:20px; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.strip-meta { display:flex; gap:8px; margin-top:4px; flex-wrap:wrap; }
.tag { font-size:11px; font-weight:500; padding:2px 8px; border-radius:20px; background:var(--surface2); color:var(--muted); border:1px solid var(--border); }
.tag.gold { background:rgba(232,184,75,0.12); color:var(--accent); border-color:rgba(232,184,75,0.3); }
.back-btn {
  display:flex; align-items:center; gap:5px;
  color:var(--muted); background:var(--surface2); border:1px solid var(--border);
  padding:7px 14px; border-radius:8px; font-size:13px; font-weight:500;
  cursor:pointer; transition:all .2s; flex-shrink:0; font-family:'DM Sans',sans-serif;
}
.back-btn:hover { color:var(--text); border-color:var(--accent); }
.back-btn svg { width:14px; height:14px; }
#ep-controls { display:none; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
#ep-controls.show { display:flex; }
.ep-select {
  background:var(--surface); border:1px solid var(--border); color:var(--text);
  padding:8px 14px; border-radius:8px; font-family:'DM Sans',sans-serif;
  font-size:14px; cursor:pointer; outline:none; flex:1; min-width:140px;
}
.ep-select:focus { border-color:var(--accent); }
.player-wrap {
  position:relative; width:100%;
  padding-top:clamp(240px,56.25vw,560px);
  background:#000; border-radius:14px; overflow:hidden;
  border:1px solid var(--border); box-shadow:0 0 60px rgba(0,0,0,0.8);
}
#player-frame { position:absolute; inset:0; width:100%; height:100%; border:none; }
#play-overlay {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:rgba(8,10,15,0.8); cursor:pointer; z-index:10; transition:opacity .3s;
}
#play-overlay.hidden { opacity:0; pointer-events:none; }
.play-btn-big {
  width:72px; height:72px; border-radius:50%; background:var(--accent);
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s, box-shadow .2s; box-shadow:0 0 40px rgba(232,184,75,0.4);
}
.play-btn-big:hover { transform:scale(1.1); box-shadow:0 0 60px rgba(232,184,75,0.6); }
.play-btn-big svg { width:28px; height:28px; fill:#000; margin-left:4px; }
.play-hint { margin-top:12px; font-size:13px; color:rgba(255,255,255,0.5); }
#player-loading {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:#000; z-index:5; transition:opacity .3s;
}
#player-loading.hidden { opacity:0; pointer-events:none; }
.spinner { width:38px; height:38px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-txt { margin-top:10px; font-size:13px; color:var(--muted); }
.source-row { display:flex; gap:8px; margin-top:14px; flex-wrap:wrap; align-items:center; }
.source-label { font-size:12px; color:var(--muted); font-weight:500; }
.src-btn {
  padding:7px 16px; border-radius:8px; font-size:13px; font-weight:500;
  cursor:pointer; border:1px solid var(--border); background:var(--surface);
  color:var(--muted); transition:all .2s; font-family:'DM Sans',sans-serif;
}
.src-btn:hover { border-color:var(--accent); color:var(--text); }
.src-btn.active { background:rgba(232,184,75,0.15); border-color:var(--accent); color:var(--accent); }
.info-grid { display:grid; grid-template-columns:1fr; gap:14px; margin-top:24px; }
@media(min-width:640px) { .info-grid { grid-template-columns:2fr 1fr; } }
.info-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:18px; }
.info-card h3 { font-family:'Bebas Neue',sans-serif; font-size:15px; letter-spacing:1.5px; color:var(--accent); margin-bottom:10px; }
#overview-text { font-size:14px; line-height:1.7; color:rgba(232,234,240,0.75); }
.detail-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
.detail-row:last-child { border-bottom:none; }
.detail-row .label { color:var(--muted); }
.detail-row .value { color:var(--text); font-weight:500; text-align:right; max-width:60%; }
.notice { margin-top:18px; padding:10px 14px; background:rgba(255,107,53,0.07); border:1px solid rgba(255,107,53,0.2); border-radius:8px; font-size:12px; color:rgba(255,107,53,0.75); line-height:1.6; }
</style>
</head>
<body>

<div class="backdrop-wrap"><img id="backdrop-img" alt=""></div>

<!-- HEADER -->
<header>
  <div class="logo" onclick="showHome()">Flick<span>Facts</span></div>
  <div class="search-wrap">
    <input class="search-input" id="search-input" type="text" placeholder="Search movies & TV shows..." autocomplete="off">
    <button class="search-btn" onclick="doSearch()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <div class="search-dropdown" id="search-dropdown"></div>
  </div>
</header>

<!-- HOME PAGE -->
<div class="page active" id="page-home">
  <div class="container">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('trending','movie',this)">🔥 Trending</button>
      <button class="tab-btn" onclick="switchTab('popular','movie',this)">🎬 Movies</button>
      <button class="tab-btn" onclick="switchTab('popular','tv',this)">📺 TV Shows</button>
      <button class="tab-btn" onclick="switchTab('top_rated','movie',this)">⭐ Top Rated</button>
      <button class="tab-btn" onclick="switchTab('upcoming','movie',this)">🆕 Upcoming</button>
    </div>
    <div class="sec-hdr">
      <span class="sec-title" id="grid-label">Trending Now</span>
      <span class="sec-badge" id="grid-badge">LIVE</span>
    </div>
    <div class="movie-grid" id="movie-grid"></div>
    <div class="load-more-wrap">
      <button class="load-more-btn" onclick="loadMore()">Load More</button>
    </div>
  </div>
</div>

<!-- PLAYER PAGE -->
<div class="page" id="page-player">
  <div class="player-container">
    <div class="movie-strip">
      <img id="strip-poster" src="" alt="">
      <div class="strip-info">
        <div id="strip-title">Loading...</div>
        <div class="strip-meta" id="strip-meta"></div>
      </div>
      <button class="back-btn" onclick="showHome()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </button>
    </div>
    <div id="ep-controls">
      <select class="ep-select" id="season-select" onchange="updateEpisodes()"></select>
      <select class="ep-select" id="episode-select" onchange="changeEpisode()"></select>
    </div>
    <div class="player-wrap">
      <div id="player-loading"><div class="spinner"></div><div class="loading-txt">Loading player...</div></div>
      <div id="play-overlay">
        <div class="play-btn-big"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        <div class="play-hint">Click to play</div>
      </div>
      <iframe id="player-frame" allowfullscreen allow="autoplay; fullscreen" referrerpolicy="origin"></iframe>
    </div>
    <div class="source-row">
      <span class="source-label">SERVER:</span>
      <button class="src-btn active" onclick="changeSource(0,this)">Server 1</button>
      <button class="src-btn" onclick="changeSource(1,this)">Server 2</button>
      <button class="src-btn" onclick="changeSource(2,this)">Server 3</button>
      <button class="src-btn" onclick="changeSource(3,this)">Server 4</button>
    </div>
    <div class="info-grid">
      <div class="info-card"><h3>Overview</h3><p id="overview-text">Loading...</p></div>
      <div class="info-card"><h3>Details</h3><div id="details-rows"></div></div>
    </div>
    <div class="notice">⚠️ FlickFacts does not host any video content. All streams are provided by third-party embed sources for informational purposes only.</div>
  </div>
</div>

<script>
const TMDB_KEY  = '4fc3e39dae386978d3b3c1ed6047a390';
const SMARTLINK = 'https://abackmentor.com/hh6gncqs?key=e67b408cd31d3ffb5f12cf79b04c3d65';
const IMG = 'https://image.tmdb.org/t/p/';
const API = 'https://api.themoviedb.org/3';

const SOURCES = {
  movie: [
    id      => `https://vidsrc.xyz/embed/movie/${id}`,
    id      => `https://vidsrc.to/embed/movie/${id}`,
    id      => `https://2embed.cc/embed/${id}`,
    id      => `https://multiembed.mov/?video_id=${id}&tmdb=1`,
  ],
  tv: [
    (id,s,e) => `https://vidsrc.xyz/embed/tv/${id}/${s}/${e}`,
    (id,s,e) => `https://vidsrc.to/embed/tv/${id}/${s}/${e}`,
    (id,s,e) => `https://2embed.cc/embedtv/${id}&s=${s}&e=${e}`,
    (id,s,e) => `https://multiembed.mov/?video_id=${id}&tmdb=1&s=${s}&e=${e}`,
  ]
};

let gridState   = { endpoint:'trending', mediaType:'movie', page:1 };
let playerState = { type:'movie', id:null, s:1, e:1, src:0, clicked:false, seasons:1 };
let clickMap    = {};  // tracks first-click smartlink per card
let searchTimer = null;

const TAB_META = {
  trending_movie: ['Trending Now','LIVE'],
  popular_movie:  ['Popular Movies','HOT'],
  popular_tv:     ['Popular TV Shows','HOT'],
  top_rated_movie:['Top Rated','⭐'],
  upcoming_movie: ['Coming Soon','NEW'],
};

// ── PAGES
function showHome() {
  document.getElementById('page-home').classList.add('active');
  document.getElementById('page-player').classList.remove('active');
  document.title = 'FlickFacts Player';
  document.getElementById('backdrop-img').style.opacity = 0;
}
function showPlayer() {
  document.getElementById('page-home').classList.remove('active');
  document.getElementById('page-player').classList.add('active');
}

// ── TABS
function switchTab(ep, mt, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  gridState = { endpoint:ep, mediaType:mt, page:1 };
  document.getElementById('movie-grid').innerHTML = '';
  const [label, badge] = TAB_META[`${ep}_${mt}`] || ['Movies',''];
  document.getElementById('grid-label').textContent = label;
  document.getElementById('grid-badge').textContent = badge;
  fetchGrid();
}

// ── FETCH GRID
async function fetchGrid(append=false) {
  const { endpoint, mediaType, page } = gridState;
  const url = endpoint === 'trending'
    ? `${API}/trending/${mediaType}/week?api_key=${TMDB_KEY}&page=${page}`
    : `${API}/${mediaType}/${endpoint}?api_key=${TMDB_KEY}&page=${page}`;
  if (!append) renderSkeletons();
  try {
    const d = await (await fetch(url)).json();
    if (!append) document.getElementById('movie-grid').innerHTML = '';
    renderCards(d.results || [], mediaType);
  } catch(e) { console.error(e); }
}
function renderSkeletons() {
  document.getElementById('movie-grid').innerHTML = Array(12).fill(0).map(() => `
    <div class="mc"><div class="mc-pw" style="aspect-ratio:2/3"><div class="skeleton" style="width:100%;height:100%"></div></div>
    <div class="mc-info"><div class="skeleton" style="height:13px;margin-bottom:6px"></div><div class="skeleton" style="height:11px;width:55%"></div></div></div>`).join('');
}
function renderCards(items, mediaType) {
  const grid = document.getElementById('movie-grid');
  items.forEach(item => {
    const type   = item.media_type || mediaType;
    const title  = (item.title || item.name || '').replace(/"/g,'&quot;');
    const year   = (item.release_date || item.first_air_date || '').slice(0,4);
    const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
    const poster = item.poster_path ? `${IMG}w300${item.poster_path}` : '';
    const id     = item.id;
    const div    = document.createElement('div');
    div.className = 'mc';
    div.innerHTML = `
      <div class="mc-pw">
        ${poster ? `<img src="${poster}" alt="${title}" loading="lazy">` : `<div style="width:100%;height:100%;background:var(--surface2)"></div>`}
        <div class="mc-ov"><div class="pico"><svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg></div></div>
        ${rating ? `<div class="mc-rate">★ ${rating}</div>` : ''}
      </div>
      <div class="mc-info">
        <div class="mc-title">${title}</div>
        <div class="mc-year">${year}${type==='tv'?' · TV':''}</div>
      </div>`;
    div.addEventListener('click', () => cardClick(id, type));
    grid.appendChild(div);
  });
}
function loadMore() { gridState.page++; fetchGrid(true); }

// ── CARD CLICK: 1st = smartlink, 2nd = player
function cardClick(id, type) {
  const k = `${type}_${id}`;
  if (!clickMap[k]) {
    clickMap[k] = true;
    window.open(SMARTLINK, '_blank');
    toast('Tap again to watch ▶');
  } else {
    openPlayer(id, type);
  }
}

// ── TOAST
function toast(msg) {
  let el = document.getElementById('_toast');
  if (!el) {
    el = document.createElement('div');
    el.id = '_toast';
    el.style.cssText = 'position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:11px 22px;border-radius:10px;font-size:14px;z-index:9999;box-shadow:0 8px 30px rgba(0,0,0,0.7);transition:opacity .3s;pointer-events:none;white-space:nowrap;';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 2600);
}

// ── OPEN PLAYER
async function openPlayer(id, type) {
  playerState = { type, id, s:1, e:1, src:0, clicked:false, seasons:1 };
  showPlayer();
  window.scrollTo(0,0);
  document.getElementById('strip-title').textContent = 'Loading...';
  document.getElementById('strip-meta').innerHTML = '';
  document.getElementById('overview-text').textContent = 'Loading...';
  document.getElementById('details-rows').innerHTML = '';
  document.getElementById('player-frame').src = '';
  document.getElementById('play-overlay').classList.remove('hidden');
  document.getElementById('player-loading').classList.add('hidden');
  document.getElementById('ep-controls').classList.remove('show');
  document.querySelectorAll('.src-btn').forEach((b,i) => b.classList.toggle('active',i===0));
  await fetchPlayerInfo();
}

async function fetchPlayerInfo() {
  const { id, type } = playerState;
  try {
    const d = await (await fetch(`${API}/${type}/${id}?api_key=${TMDB_KEY}&language=en-US`)).json();
    const title   = d.title || d.name || '';
    const year    = (d.release_date || d.first_air_date || '').slice(0,4);
    const rating  = d.vote_average ? d.vote_average.toFixed(1) : 'N/A';
    const runtime = d.runtime ? `${d.runtime} min` : (d.episode_run_time?.[0] ? `${d.episode_run_time[0]}m/ep` : 'N/A');
    const genres  = (d.genres||[]).slice(0,3).map(g=>g.name).join(', ');

    if (d.backdrop_path) {
      const bi = document.getElementById('backdrop-img');
      bi.src = `${IMG}w1280${d.backdrop_path}`;
      bi.onload = () => bi.style.opacity = 1;
    }
    document.getElementById('strip-poster').src = d.poster_path ? `${IMG}w185${d.poster_path}` : '';
    document.getElementById('strip-title').textContent = title;
    document.getElementById('strip-meta').innerHTML = `
      <span class="tag gold">★ ${rating}</span>
      ${year?`<span class="tag">${year}</span>`:''}
      ${genres?`<span class="tag">${genres}</span>`:''}
      <span class="tag">${type==='tv'?'TV':'Movie'}</span>`;
    document.getElementById('overview-text').textContent = d.overview || 'No overview.';
    document.title = `Watch ${title} — FlickFacts`;

    const rows = [['Rating',`${rating}/10`],['Year',year||'N/A'],['Runtime',runtime],['Language',(d.original_language||'').toUpperCase()],['Status',d.status||'N/A']];
    if (type==='tv') {
      rows.push(['Seasons', d.number_of_seasons||'N/A'],['Episodes',d.number_of_episodes||'N/A']);
      playerState.seasons = d.number_of_seasons || 1;
      buildSeasonSelect();
    }
    document.getElementById('details-rows').innerHTML = rows.map(([l,v])=>`<div class="detail-row"><span class="label">${l}</span><span class="value">${v}</span></div>`).join('');
  } catch(e) { console.error(e); }
}

// ── TV SELECTS
function buildSeasonSelect() {
  const sel = document.getElementById('season-select');
  sel.innerHTML = '';
  for (let i=1; i<=playerState.seasons; i++) {
    const o = document.createElement('option');
    o.value=i; o.textContent=`Season ${i}`;
    sel.appendChild(o);
  }
  document.getElementById('ep-controls').classList.add('show');
  updateEpisodes();
}
async function updateEpisodes() {
  playerState.s = parseInt(document.getElementById('season-select').value);
  const sel = document.getElementById('episode-select');
  sel.innerHTML = '<option>Loading...</option>';
  try {
    const d = await (await fetch(`${API}/tv/${playerState.id}/season/${playerState.s}?api_key=${TMDB_KEY}`)).json();
    sel.innerHTML = (d.episodes||[]).map(ep=>`<option value="${ep.episode_number}">Ep ${ep.episode_number}: ${ep.name}</option>`).join('');
    playerState.e = 1;
  } catch { sel.innerHTML = '<option value="1">Episode 1</option>'; }
  loadPlayerFrame();
}
function changeEpisode() {
  playerState.e = parseInt(document.getElementById('episode-select').value||1);
  loadPlayerFrame();
}

// ── LOAD FRAME
function loadPlayerFrame() {
  const frame = document.getElementById('player-frame');
  document.getElementById('player-loading').classList.remove('hidden');
  const src = playerState.type === 'movie'
    ? SOURCES.movie[playerState.src](playerState.id)
    : SOURCES.tv[playerState.src](playerState.id, playerState.s, playerState.e);
  frame.src = src;
  frame.onload = () => document.getElementById('player-loading').classList.add('hidden');
  setTimeout(() => document.getElementById('player-loading').classList.add('hidden'), 8000);
}

// ── PLAY BUTTON (inside player)
document.getElementById('play-overlay').addEventListener('click', function() {
  if (!playerState.clicked) {
    playerState.clicked = true;
    window.open(SMARTLINK, '_blank');
  }
  this.classList.add('hidden');
  loadPlayerFrame();
});

// ── SERVER CHANGE (always fires smartlink)
function changeSource(idx, btn) {
  playerState.src = idx;
  document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  window.open(SMARTLINK, '_blank');
  loadPlayerFrame();
}

// ── SEARCH
document.getElementById('search-input').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if (q.length < 2) { closeDD(); return; }
  searchTimer = setTimeout(() => runSearch(q), 380);
});
document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key==='Enter') runSearch(document.getElementById('search-input').value.trim());
  if (e.key==='Escape') closeDD();
});
document.addEventListener('click', e => { if (!e.target.closest('.search-wrap')) closeDD(); });

async function doSearch() { runSearch(document.getElementById('search-input').value.trim()); }
async function runSearch(q) {
  if (!q) return;
  const dd = document.getElementById('search-dropdown');
  dd.innerHTML = '<div class="s-msg">Searching...</div>';
  dd.classList.add('open');
  try {
    const d = await (await fetch(`${API}/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}`)).json();
    const items = (d.results||[]).filter(r=>r.media_type==='movie'||r.media_type==='tv').slice(0,8);
    if (!items.length) { dd.innerHTML='<div class="s-msg">No results found</div>'; return; }
    dd.innerHTML = items.map(item => {
      const title  = (item.title||item.name||'').replace(/'/g,"\\'");
      const year   = (item.release_date||item.first_air_date||'').slice(0,4);
      const rating = item.vote_average ? item.vote_average.toFixed(1) : '';
      const poster = item.poster_path ? `${IMG}w92${item.poster_path}` : '';
      const type   = item.media_type;
      return `<div class="sri" onclick="cardClick(${item.id},'${type}');closeDD()">
        ${poster?`<img src="${poster}" alt="">`:'<div style="width:36px;height:52px;background:var(--surface2);border-radius:4px;flex-shrink:0"></div>'}
        <div class="sri-info">
          <div class="sri-title">${title}</div>
          <div class="sri-meta">${year}${rating?` · ★ ${rating}`:''}</div>
        </div>
        <span class="sri-type ${type==='tv'?'tv':''}">${type==='tv'?'TV':'Movie'}</span>
      </div>`;
    }).join('');
  } catch { dd.innerHTML='<div class="s-msg">Search failed</div>'; }
}
function closeDD() { document.getElementById('search-dropdown').classList.remove('open'); }

// ── INIT
(function() {
  const p = new URLSearchParams(location.search);
  const id = p.get('id'), type = p.get('type')||'movie';
  if (id) openPlayer(id, type);
  else fetchGrid();
})();
</script>
</body>
